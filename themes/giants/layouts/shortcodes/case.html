<div class="gnts-case">
  <div class="gnts-case-label">{{ .Get "label" | default "Кейс" }}</div>
  <h4>{{ .Get "title" }}</h4>
  <p>{{ .Inner | markdownify }}</p>
  {{ with .Get "tags" }}
  <div class="gnts-case-tags">
    {{ range split . "," }}
    <span class="gnts-case-tag">{{ . | strings.TrimSpace }}</span>
    {{ end }}
  </div>
  {{ end }}
  {{ with .Get "link" }}
  <a class="gnts-case-link" href="{{ . }}">
    Читать подробнее
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  {{ end }}
</div>
