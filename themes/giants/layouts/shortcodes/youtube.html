<div class="youtube-embed">
  <iframe
    width="100%"
    height="480"
    src="https://www.youtube.com/embed/{{ .Get "id" | default (.Get 0) }}"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen
    loading="lazy"
    title="{{ .Get "title" | default "Видео" }}"
    style="border-radius: 8px;">
  </iframe>
</div>
