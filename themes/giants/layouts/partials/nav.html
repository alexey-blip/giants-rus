<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <img class="logo-img logo-img--dark" src="/images/logo-black.png" alt="Гиганты" height="28">
      <img class="logo-img logo-img--light" src="/images/logo-white.png" alt="Гиганты" height="28">
    </a>

    <nav class="nav">
      {{ range .Site.Menus.main }}
        {{ if lt .Weight 100 }}
        <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </nav>

    <a href="{{ .Site.Params.ctaOrder }}" class="header-cta">Заказать токеномику</a>

    <button class="burger" aria-label="Меню">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<div class="mobile-nav">
  {{ range .Site.Menus.main }}
    {{ if lt .Weight 100 }}
    <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
  {{ end }}
  <a href="{{ .Site.Params.ctaOrder }}" class="header-cta">Заказать токеномику</a>
</div>
