baseURL = "https://tokenomika.pro/"
title = "Гиганты — Лаборатория Токеномики"
languageCode = "ru"
defaultContentLanguage = "ru"
theme = "giants"

enableRobotsTXT = true

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false
    guessSyntax = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[params]
  description = "Крупнейшая русскоязычная база знаний по токеномике. Курс МФТИ, модели, кейсы, инструменты."
  author = "Алексей Каранюк"
  logo = "/images/logo.svg"
  favicon = "/images/favicon.ico"
  ogImage = "/images/og-default.png"
  ctaConsultation = "https://tokenomika.pro/consultation/"
  ctaOrder = "https://tokenomika.pro/order/"
  telegram = "https://t.me/giants_tokenomics"
  youtube = "https://www.youtube.com/playlist?list=PLeLfGV5qnQybhgDjklLf39CJnD2aro7la"
  github = "https://github.com/giantstokenomics"

[taxonomies]
  tag = "tags"
  category = "categories"

[[menus.main]]
  name = "База знаний"
  url = "/knowledge/"
  weight = 10

[[menus.main]]
  name = "Кейсы"
  url = "/cases/"
  weight = 20

[[menus.main]]
  name = "О нас"
  url = "/about/"
  weight = 100
