<!--
  GNTS Case Study Card Component
  Self-contained inline block.
  Usage: copy block, edit title/description/link.
  Later: Hugo shortcode {{< case title="..." link="..." >}}
-->
<div class="gnts-case">
  <style>
    .gnts-case {
      padding: 24px 28px;
      margin: 32px 0;
      background: linear-gradient(90deg, var(--accent-bg, rgba(124,58,237,0.04)), transparent 70%);
      border-left: 3px solid var(--accent, #7c3aed);
      border-radius: 0 10px 10px 0;
      border-top: 1px solid var(--border, rgba(0,0,0,0.04));
      border-right: 1px solid var(--border, rgba(0,0,0,0.04));
      border-bottom: 1px solid var(--border, rgba(0,0,0,0.04));
    }
    .gnts-case-label {
      font-family: var(--font-heading, 'Space Grotesk', sans-serif);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent, #7c3aed);
      margin-bottom: 8px;
    }
    .gnts-case h4 {
      font-family: var(--font-heading, 'Space Grotesk', sans-serif);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary, #1a1a2e);
      margin-bottom: 8px;
    }
    .gnts-case p {
      font-family: var(--font-body, 'Lora', serif);
      font-size: 0.95rem;
      color: var(--text-secondary, #4a4a5a);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .gnts-case-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .gnts-case-tag {
      font-family: var(--font-heading, 'Space Grotesk', sans-serif);
      font-size: 0.68rem;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 100px;
      background: var(--accent-bg, rgba(124,58,237,0.05));
      color: var(--text-muted, #8a8a9a);
      border: 1px solid var(--border, rgba(0,0,0,0.06));
    }
    .gnts-case-link {
      font-family: var(--font-heading, 'Space Grotesk', sans-serif);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent, #7c3aed);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .gnts-case-link:hover { color: var(--accent-hover, #6d28d9); }
    .gnts-case-link svg { transition: transform 0.2s; }
    .gnts-case-link:hover svg { transform: translateX(3px); }
  </style>

  <div class="gnts-case-label">Кейс</div>
  <h4>8lends: bonding curve для кредитного протокола</h4>
  <p>Модель с формулой P<sub>mint</sub> = P(0) &times; ($L<sub>minted</sub>)<sup>&alpha;</sup> и детальными таблицами расчётов стоимости минтинга. Показывает экспоненциальный рост цены от 1 до 25 USDT при увеличении supply.</p>
  <div class="gnts-case-tags">
    <span class="gnts-case-tag">DeFi Lending</span>
    <span class="gnts-case-tag">Bonding Curve</span>
    <span class="gnts-case-tag">Proof-of-Loan</span>
  </div>
  <a class="gnts-case-link" href="#">
    Читать кейс полностью
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
</div>
